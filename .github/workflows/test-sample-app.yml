name: "Test — Sample App"

on:
  push:
    paths:
      - "apps/sample-app/**"
      - ".github/workflows/test-sample-app.yml"
  pull_request:
    paths:
      - "apps/sample-app/**"

jobs:
  test:
    name: "Sample App Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/sample-app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/sample-app/requirements.txt
          pip install pytest pytest-cov httpx

      - name: "Test Case 1 — Health & Root endpoints"
        run: |
          cd apps/sample-app
          python -m pytest tests/test_main.py::test_health tests/test_main.py::test_root \
            -v --tb=short \
            --cov=src --cov-report=term-missing \
            -p no:warnings
        env:
          APP_VERSION: "1.0.0"

      - name: "Test Case 2 — Predict & Metrics endpoints"
        run: |
          cd apps/sample-app
          python -m pytest tests/test_main.py::test_predict_basic \
                           tests/test_main.py::test_predict_single_feature \
                           tests/test_main.py::test_metrics_endpoint \
            -v --tb=short \
            -p no:warnings
        env:
          APP_VERSION: "1.0.0"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sample-app-coverage
          path: apps/sample-app/.coverage
