name: "Test — ML Model Service"

on:
  push:
    paths:
      - "apps/ml-model/**"
      - ".github/workflows/test-ml-model.yml"
  pull_request:
    paths:
      - "apps/ml-model/**"

jobs:
  test:
    name: "ML Model Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/ml-model/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/ml-model/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Train model (required before tests)
        run: |
          cd apps/ml-model
          python -m src.train
        env:
          PYTHONPATH: .

      - name: "Test Case 1 — Model training produces valid artefact"
        run: |
          cd apps/ml-model
          python - <<'EOF'
          import joblib, json, os

          model_path = "models/model.joblib"
          meta_path  = "models/metadata.json"

          assert os.path.exists(model_path), f"model.joblib not found at {model_path}"
          model = joblib.load(model_path)

          meta = json.load(open(meta_path))
          assert meta["model_version"] == "1.0.0", "Version mismatch"
          assert meta["accuracy"] > 0.80,          f"Accuracy too low: {meta['accuracy']}"
          assert meta["n_features"] == 10,         "Feature count mismatch"

          import numpy as np
          X = np.random.randn(5, 10)
          preds = model.predict(X)
          assert len(preds) == 5,      "Expected 5 predictions"
          assert set(preds) <= {0, 1}, f"Unexpected labels: {set(preds)}"

          proba = model.predict_proba(X)
          assert proba.shape == (5, 2), "Proba shape mismatch"
          assert all(abs(row.sum() - 1.0) < 1e-6 for row in proba), "Probabilities don't sum to 1"

          print(f"✅ Model artefact valid  accuracy={meta['accuracy']}  features={meta['n_features']}")
          EOF

      - name: "Test Case 2 — Inference API endpoints return correct schema"
        run: |
          cd apps/ml-model
          python -m pytest tests/test_serve.py \
            -v --tb=short \
            --cov=src --cov-report=term-missing \
            -p no:warnings
        env:
          APP_VERSION: "1.0.0"
          PYTHONPATH: .

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ml-model-coverage
          path: apps/ml-model/.coverage
