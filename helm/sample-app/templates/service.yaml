apiVersion: v1
kind: ServiceAccount
metadata:
  name: sample-app
  namespace: apps
---
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: apps
  labels:
    app: sample-app
    platform.version: "1.0.0"
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    app: sample-app
